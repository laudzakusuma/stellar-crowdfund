name: CI/CD — Stellar Crowdfund

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_STELLAR_NETWORK: TESTNET
  NEXT_PUBLIC_SOROBAN_RPC: https://soroban-testnet.stellar.org
  NEXT_PUBLIC_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
  NEXT_PUBLIC_CROWDFUND_CONTRACT_ID: ${{ secrets.CROWDFUND_CONTRACT_ID || 'PLACEHOLDER_CROWDFUND' }}
  NEXT_PUBLIC_CROWD_TOKEN_CONTRACT_ID: ${{ secrets.CROWD_TOKEN_CONTRACT_ID || 'PLACEHOLDER_TOKEN' }}

jobs:

  contract-tests:
    name: Contract Tests (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run crowdfund tests
        run: cargo test -p crowdfund --verbose

      - name: Run crowd-token tests (if present)
        run: |
          if [ -f contracts/crowd-token/Cargo.toml ]; then
            cargo test -p crowd-token --verbose
          else
            echo "crowd-token not present yet — skipping"
          fi

      - name: Build WASM
        run: |
          cargo build --release --target wasm32-unknown-unknown -p crowdfund
          echo "crowdfund.wasm: $(wc -c < target/wasm32-unknown-unknown/release/crowdfund.wasm) bytes"

  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: ESLint via Next.js
        run: npx next lint --max-warnings 10

      - name: TypeScript check
        run: npx tsc --noEmit

  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: |
          SCRIPTS=$(node -e "const p=require('./package.json'); console.log(Object.keys(p.scripts||{}).join(' '))")
          if echo "$SCRIPTS" | grep -q "test"; then
            npm test -- --passWithNoTests
          else
            npx vitest run --passWithNoTests
          fi

  build:
    name: Next.js Production Build
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [contract-tests, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed: $URL"

  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: treosh/lighthouse-ci-action@v11
        with:
          urls: ${{ secrets.VERCEL_PRODUCTION_URL }}
          uploadArtifacts: true
          temporaryPublicStorage: true
          budgetPath: ./lighthouse-budget.json

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: npm audit
        run: npm audit --audit-level=critical
        continue-on-error: true

      - name: Cargo audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true